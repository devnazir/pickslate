<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 280px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #e0e0e0;
        font-size: 13px;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        color: #f0f0f0;
        margin-bottom: 4px;
      }
      p {
        font-size: 11px;
        color: #555;
        margin-bottom: 14px;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      .input-wrap {
        position: relative;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 7px;
        color: #e0e0e0;
        font-size: 13px;
        padding: 8px 56px 8px 10px;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      input:focus {
        border-color: #f0a500;
      }
      .show-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #444;
        cursor: pointer;
        font-size: 11px;
        padding: 2px 5px;
        border-radius: 4px;
        font-family: inherit;
      }
      .show-btn:hover {
        color: #aaa;
      }
      .hint {
        font-size: 11px;
        color: #444;
        margin-bottom: 14px;
        line-height: 1.5;
      }
      .hint a {
        color: #f0a500;
        text-decoration: none;
      }
      .hint a:hover {
        text-decoration: underline;
      }
      .save-btn {
        width: 100%;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        background: #f0a500;
        border: none;
        border-radius: 7px;
        color: #111;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
      }
      .save-btn:hover {
        background: #ffb820;
      }
      .save-btn:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .test-btn {
        width: 100%;
        padding: 8px;
        font-size: 12px;
        font-weight: 500;
        background: none;
        border: 1px solid #2a2a2a;
        border-radius: 7px;
        color: #666;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
        margin-top: 6px;
      }
      .test-btn:hover {
        border-color: #3a3a3a;
        color: #aaa;
      }
      .test-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        text-align: center;
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
        color: #6ec97a;
      }
      .divider {
        border: none;
        border-top: 1px solid #1e1e1e;
        margin: 14px 0;
      }
      .how {
        font-size: 11px;
        color: #444;
        line-height: 1.7;
      }
      .how b {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>🌐 Claude Translate</h1>
    <p>Collect text from any page, translate all at once, export to Excel.</p>

    <label>Anthropic API Key</label>
    <div class="input-wrap">
      <input
        type="password"
        id="key"
        placeholder="sk-ant-api03-…"
        autocomplete="off"
      />
      <button class="show-btn" id="show">Show</button>
    </div>
    <div class="hint">
      Get your key at
      <a href="https://console.anthropic.com" target="_blank"
        >console.anthropic.com</a
      >
    </div>

    <button class="save-btn" id="save">Save</button>
    <button class="test-btn" id="test">Test key</button>
    <div class="status" id="status"></div>

    <div class="divider"></div>
    <div class="how">
      <b>How it works:</b><br />
      1. The panel opens on every page<br />
      2. Click "Start picking" → click any elements<br />
      3. Pick your target languages<br />
      4. Hit <b>Translate</b> → get CSV for Excel
    </div>

    <script src="settings.js"></script>
  </body>
</html>
